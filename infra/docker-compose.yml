version: "3.8"
services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"

  redis:
    image: redis:6
    ports:
      - "6379:6379"
